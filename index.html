<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { 
            font-family: sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            background-color: #f4f4f9; 
            margin: 0; 
            padding: 20px; 
        }
        #controls { 
            margin-bottom: 20px; 
            display: flex; 
            gap: 10px; 
            flex-wrap: wrap; 
            justify-content: center; 
            align-items: center;
        }
        select, button { 
            padding: 10px 15px; 
            font-size: 15px; 
            border-radius: 5px; 
            border: 1px solid #ccc;
        }
        button {
            cursor: pointer; 
            border: none;
            background-color: #007bff; 
            color: white; 
            transition: background-color 0.3s; 
        }
        button:hover { background-color: #0056b3; } 
        #canvas-container { 
            border: 2px solid #ccc; 
            background-color: white; 
            border-radius: 8px; 
            overflow: hidden; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .instructions { 
            margin-top: 15px; 
            color: #555; 
            text-align: center;
            max-width: 800px;
        }
    </style>
</head>
<body>

    <h2>Simulasi Fisika Sederhana (Jungkat-Jungkit)</h2>
    
    <div id="controls">
        <label for="weight-select"><strong>Pilih Berat:</strong></label>
        <select id="weight-select">
            <option value="1">1 kg</option>
            <option value="2">2 kg</option>
            <option value="3" selected>3 kg</option>
            <option value="4">4 kg</option>
            <option value="5">5 kg</option>
        </select>

        <button id="btn-left">Jatuhkan Kotak Kiri</button>
        <button id="btn-right">Jatuhkan Kotak Kanan</button>
        <button id="btn-scale" style="background-color: #28a745;">Perbesar Kotak (Skala)</button>
        <button id="btn-reset" style="background-color: #dc3545;">Reset Ulang</button>
    </div>

    <div id="canvas-container"></div>

    <div class="instructions">
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <script>
        const Engine = Matter.Engine,
              Render = Matter.Render,
              Runner = Matter.Runner,
              Bodies = Matter.Bodies,
              Composite = Matter.Composite,
              Constraint = Matter.Constraint,
              Mouse = Matter.Mouse,
              MouseConstraint = Matter.MouseConstraint,
              Body = Matter.Body,
              Events = Matter.Events; 

        const engine = Engine.create();
        const world = engine.world;

        const render = Render.create({
            element: document.getElementById('canvas-container'),
            engine: engine,
            options: { width: 800, height: 500, wireframes: false, background: '#eef2f3' }
        });

        const ground = Bodies.rectangle(400, 490, 810, 60, { isStatic: true, render: { fillStyle: '#666' } });
        const fulcrum = Bodies.polygon(400, 440, 3, 40, { 
            isStatic: true, angle: -Math.PI / 2, render: { fillStyle: '#333' } 
        });
        
        const plankBase = Bodies.rectangle(400, 390, 600, 20); 
        const stopperLeft = Bodies.rectangle(110, 360, 20, 60);
        const stopperRight = Bodies.rectangle(690, 360, 20, 60);
        
        const plank = Body.create({
            parts: [plankBase, stopperLeft, stopperRight],
            render: { fillStyle: '#d2b48c' }
        });
        
        const initialPlankPos = { x: plank.position.x, y: plank.position.y };
        
        const hinge = Constraint.create({
            bodyA: plank, pointB: { x: 400, y: 390 }, stiffness: 1, length: 0
        });

        Composite.add(world, [ground, fulcrum, plank, hinge]);

        const mouse = Mouse.create(render.canvas);
        const mouseConstraint = MouseConstraint.create(engine, {
            mouse: mouse, constraint: { stiffness: 0.2, render: { visible: false } }
        });
        Composite.add(world, mouseConstraint);
        render.mouse = mouse; 

        Render.run(render);
        const runner = Runner.create();
        Runner.run(runner, engine);

        let boxes = []; 

        function addBox(xPosition) {
            const weight = parseInt(document.getElementById('weight-select').value);
            const size = 20 + (weight * 10); 
            
            const box = Bodies.rectangle(xPosition, 50, size, size, { 
                render: { fillStyle: Math.random() > 0.5 ? '#ff6b6b' : '#4ecdc4' }
            });
            
            Body.setMass(box, weight);
            box.customWeight = weight;
            
            boxes.push(box);
            Composite.add(world, box);
        }

        Events.on(render, 'afterRender', function() {
            const context = render.context;
            context.font = "bold 14px Arial";
            context.textAlign = "center";
            
            context.fillStyle = "white";
            boxes.forEach(box => {
                context.fillText(`${box.customWeight} kg`, box.position.x, box.position.y + 5);
            });
        });

        document.getElementById('btn-left').addEventListener('click', () => addBox(200));
        document.getElementById('btn-right').addEventListener('click', () => addBox(600));
        
        document.getElementById('btn-scale').addEventListener('click', () => {
            boxes.forEach(box => { Body.scale(box, 1.2, 1.2); });
        });

        document.getElementById('btn-reset').addEventListener('click', () => {
            boxes.forEach(box => Composite.remove(world, box));
            boxes = []; 
            Body.setPosition(plank, initialPlankPos);
            Body.setAngle(plank, 0);
            Body.setAngularVelocity(plank, 0);
            Body.setVelocity(plank, { x: 0, y: 0 });
        });

        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault(); 
                addBox(200); 
            }
        });
    </script>
</body>
</html>
